
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NGK Infra | Clarity in Construction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      :root {
        --warm-off-white: #F8F7F4;
        --charcoal: #1A1A1A;
        --midnight-blue: #1E2B3A;
        --slate-grey: #5F6B75;
        --teal-steel: #3C6E71;
        --divider: #E5E5E5;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--warm-off-white);
        color: var(--charcoal);
        margin: 0;
        overflow-x: hidden;
      }
      h1, h2, h3, .font-serif {
        font-family: 'Playfair Display', serif;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--warm-off-white);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--slate-grey);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--midnight-blue);
      }
      .blueprint-grid {
        background-image: linear-gradient(to right, rgba(95, 107, 117, 0.08) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(95, 107, 117, 0.08) 1px, transparent 1px);
        background-size: 50px 50px;
      }
      .bg-warm { background-color: var(--warm-off-white); }
      .text-charcoal { color: var(--charcoal); }
      .border-divider { border-color: var(--divider); }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      @media (max-width: 640px) {
        body { padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "framer-motion": "https://esm.sh/framer-motion@^12.34.0",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
